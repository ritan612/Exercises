<template>
    <lightning-card title="Create New Quote" icon-name="standard:quote">
        <div>
            
            <template lwc:if={isStageNew}>
                
                <lightning-record-edit-form object-api-name="Quote" onsuccess={handleSuccess}>
                    <lightning-messages></lightning-messages>
                    
                    <lightning-input-field field-name="OpportunityId" value={recordId} disabled></lightning-input-field>
                    <lightning-input-field field-name="Name" required></lightning-input-field>
                    
                    <template lwc:if={isOffice}>
                        <lightning-input-field field-name="Proposed_Start_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Proposed_End_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Payment_Terms__c" required></lightning-input-field>
                        <lightning-input-field field-name="Grace_Period_Months__c" required></lightning-input-field>
                    </template>
                    
                    <template lwc:if={isRetail}>
                        <lightning-input-field field-name="Proposed_Start_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Proposed_End_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Payment_Terms__c" required></lightning-input-field>
                        <lightning-input-field field-name="Grace_Period_Months__c" required></lightning-input-field>
                        <lightning-input-field field-name="Retail_Sales_Category__c" required></lightning-input-field>
                    </template>
                    
                    <template lwc:if={isLand}>
                        <lightning-input-field field-name="Proposed_Start_Date__c" required></lightning-input-field>
                        <lightning-input-field field-name="Proposed_Duration__c" onchange={handleDurationChange} required></lightning-input-field>                        
                        <lightning-input-field field-name="Rent_Review_Frequency__c" required></lightning-input-field>
                        <lightning-input-field field-name="Payment_Terms__c" value="4" disabled></lightning-input-field>
                        <lightning-input type="file" label="Choose PDF" accept="pdf/*" onchange={handleFileChange}></lightning-input>
                          <lightning-button label="Upload to Salesforce" onclick={uploadFile} variant="brand" disabled={isUploadDisabled}></lightning-button>
                            <template if:true={status}>
                                <p>{status}</p>
                            </template>
            </template>
            
            <div>
                <lightning-button type="submit" variant="brand" label="Create Quote"></lightning-button>
            </div>
            
        </lightning-record-edit-form>
    </template>
    
    <template lwc:else>
        <div role="alert">
            <h2>Quotes can only be created when the Opportunity Stage is 'New'.</h2>
        </div>
    </template>
    
</div>
</lightning-card>
</template>
