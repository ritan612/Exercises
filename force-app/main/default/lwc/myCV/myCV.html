<template>
    <h1>{name} CV </h1>
    <lightning-accordion allow-multiple-sections-open>
        <lightning-accordion-section name="prof" label="Professional Summary">
            <p>{professional_summary}</p>
        </lightning-accordion-section>

        <lightning-accordion-section name="tech" label="Technical Skill">
            <ul>
                <template for:each={technical_skills} for:item="skill">
                    <li key={skill}>
                        {skill}
                    </li>
                </template>
            </ul>
        </lightning-accordion-section>

        <lightning-accordion-section name ="profex" label="Proffesional Experience">
            <lightning-accordion allow-multiple-sections-open>
                <template for:each={experiences} for:item="job">
                    <lightning-accordion-section key={job.id}  name={job.id} label={job.title}>
                        <div>
                            <p><strong>Company:</strong> {job.company}</p>
                            <p><em>{job.date} | {job.location}</em></p>
                            <p>{job.description}</p>
                        </div>
                    </lightning-accordion-section>
                </template>
            </lightning-accordion>
        </lightning-accordion-section>

        <lightning-accordion-section name="edu" label="Education">
            <p>{education}</p>
        </lightning-accordion-section>


        <lightning-accordion-section name="cert" label="Certifications And Awards">
            <ul>
                <template for:each={certifications} for:item="certification">
                    <li key={certification}>
                        {certification}
                    </li>
                </template>
            </ul>
        </lightning-accordion-section>

        <lightning-accordion-section name="lang" label="Languages">
            <ul>
                <template for:each={languages} for:item="language">
                    <li key={language}>
                        {language}
                    </li>
                </template>
            </ul>
        </lightning-accordion-section>


    </lightning-accordion>
</template>
